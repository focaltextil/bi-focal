<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <title>Focal Gestão</title>
</head>

<body>

    <section id="login-tela" class="login-screen">

        <video autoplay muted loop src="./assets/0113.mp4"></video>

        <img src="./img/logo.png" alt="">

        <p class="label-logo">Focal Gestão</p>

        <div class="container">

            <form id="loginForm">

                <label for="username">Usuário:</label>

                <input type="text" id="username" name="username" required>

                <label for="password">Senha:</label>

                <input type="password" id="password" name="password" required>

                <button id="btn_entrar" class="btn" type="submit">Entrar</button>

            </form>

            <p id="message"></p>

        </div>

    </section>

</body>

<script src="./javascripts/login.js"></script>

</html>
